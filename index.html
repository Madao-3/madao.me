<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADAO — Trading Dashboard</title>
  <meta name="description" content="MADAO AI Agent Dashboard — Druckenmiller-style macro trading signal analysis">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">MADAO</a>
      <div class="nav-right">
        <ul class="nav-links" id="nav-links">
          <li>
            <a href="index.html" class="active">
              <i data-lucide="candlestick-chart" class="nav-icon"></i>
              <span data-i18n="nav.trading">Trading</span>
            </a>
          </li>
          <li>
            <a href="health.html">
              <i data-lucide="heart-pulse" class="nav-icon"></i>
              <span data-i18n="nav.health">Health</span>
            </a>
          </li>
          <li>
            <a href="work.html">
              <i data-lucide="briefcase" class="nav-icon"></i>
              <span data-i18n="nav.work">Work</span>
            </a>
          </li>
        </ul>
        <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">中文</button>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Trading Content (populated by JS) -->
  <main id="trading-content"></main>

  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/trading.js"></script>
  <script>
    // Initialize Lucide icons after DOM + dynamic content
    function initIcons() {
      if (window.lucide) {
        try { lucide.createIcons(); } catch(e) {}
      }
    }
    document.addEventListener('DOMContentLoaded', function() {
      initIcons();
    });
    window.addEventListener('langchange', function() {
      setTimeout(initIcons, 60);
    });
    // Also re-init after trading data renders
    window.addEventListener('trading-rendered', function() {
      setTimeout(initIcons, 30);
    });
  </script>
</body>
</html>
