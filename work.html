<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">MADAO</a>
      <div class="nav-right">
        <ul class="nav-links" id="nav-links">
          <li>
            <a href="index.html">
              <i data-lucide="candlestick-chart" class="nav-icon"></i>
              <span data-i18n="nav.trading">Trading</span>
            </a>
          </li>
          <li>
            <a href="health.html">
              <i data-lucide="heart-pulse" class="nav-icon"></i>
              <span data-i18n="nav.health">Health</span>
            </a>
          </li>
          <li>
            <a href="work.html" class="active">
              <i data-lucide="briefcase" class="nav-icon"></i>
              <span data-i18n="nav.work">Work</span>
            </a>
          </li>
        </ul>
        <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">中文</button>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

        <span class="preview-chip" data-i18n="work.chip1">Daily Log</span>
        <span class="preview-chip" data-i18n="work.chip2">Project Tracker</span>
        <span class="preview-chip" data-i18n="work.chip3">Code Commits</span>
        <span class="preview-chip" data-i18n="work.chip4">Meeting Notes</span>
        <span class="preview-chip" data-i18n="work.chip5">Goal Progress</span>
      </div>
    </div>

  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.lucide) lucide.createIcons();
    });
    window.addEventListener('langchange', function() {
      setTimeout(function() { if (window.lucide) lucide.createIcons(); }, 50);
    });
  </script>
